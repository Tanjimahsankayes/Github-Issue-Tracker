<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>

    <!-- CSS Style -->
     <link rel="stylesheet" href="style/style.css">

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">


    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body>
    <!-- sign up -->
        <div id="loginPage" class=" w-full max-w-sm sm:max-w-md mx-6">
            <div class="bg-white rounded-lg shadow-lg p-8">
        
                <div class="flex justify-center  mb-6 ">
                    <span class=" w-16"><img src="./assets/github-logo.png" alt="Github logo"></span>
                </div>
        
                <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">GitHub Issues Tracker</h1>
        
        
                <p class="text-center text-gray-600 mb-8">Sign in to manage your issues</p>
        
                <!-- Login Form -->
                <form id="loginForm" class="space-y-6">
        
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter Username"
                            class="w-full px-4 py-2 border-[1.5px] border-gray-400 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
                            required>
                            <p class="text-blue-600 pt-1">Default: admin</p>
                    </div>
        
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter Password"
                            class="w-full px-4 py-2 border-[1.5px] border-gray-400 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
                            required>
                            <p class="text-blue-600 pt-1">Default: admin123</p>
                    </div>
        
        
                    <button type="submit"
                        class="w-full bg-[#4A00FF] text-white py-2 px-4 rounded-lg hover:bg-purple-700 transition duration-200 font-medium">
                        Sign In
                    </button>
                </form>
        
        
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">OR</span>
                    </div>
                </div>
        
                <h3 class="text-sm text-center font-semibold text-gray-500 mb-2">Demo Credentials :</h3>
                <div class="bg-gray-200 rounded-lg p-4 text-center">
                    <div class="space-y-1 text-sm ">
                        <p class="font-bold">Username : <span class="font-normal">admin</span></p>
                        <p class="font-bold">Password : <span class="font-normal">admin123</span></p>
                    </div>
        
                </div>
            </div>
        </div>




    <script src="script/script.js"></script>
</body>
</html>
